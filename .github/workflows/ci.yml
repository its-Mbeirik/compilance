name: CI — Lint + Tests unitaires

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-unit:
    name: Backend — lint + tests unitaires
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install pydantic>=2.9.0 pydantic-settings typing_extensions
          pip install pytest pytest-cov ruff

      - name: Lint avec ruff
        working-directory: backend
        run: ruff check shared/ tests/

      - name: Tests unitaires (schemas + guards, sans DB ni modèles)
        working-directory: backend
        run: pytest tests/test_schemas.py tests/test_guards.py -v --tb=short

  frontend-lint:
    name: Frontend — lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint Next.js
        working-directory: frontend
        run: npm run lint
