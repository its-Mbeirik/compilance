services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: conformite-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-conformite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-conformite_dev_password_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-conformite}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-conformite} -d ${POSTGRES_DB:-conformite}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    name: conformite_postgres_data
